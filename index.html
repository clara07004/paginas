<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast — Páginas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 16px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .pages-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .page-card {
            padding: 20px;
            background: #f9f9f9;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .page-card:hover {
            background: #f0f0f0;
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .page-title {
            font-weight: 600;
            font-size: 16px;
            color: #1a1a1a;
            margin-bottom: 5px;
        }

        .page-desc {
            font-size: 13px;
            color: #666;
        }

        .page-card.featured {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .page-card.featured .page-title {
            color: white;
        }

        .page-card.featured .page-desc {
            color: rgba(255, 255, 255, 0.9);
        }

        .footer {
            font-size: 12px;
            color: #999;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .icon {
            font-size: 24px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">⚡</div>
        <h1>Fast Sistemas Construtivos</h1>
        <p class="subtitle">Automação inteligente de emails</p>

        <div class="pages-grid">
            <a href="dashboard-visual.html" class="page-card featured">
                <div class="icon">📊</div>
                <div class="page-title">Dashboard Visual</div>
                <div class="page-desc">Demonstração executiva do classificador de emails</div>
            </a>
        </div>

        <div class="footer">
            <p>© 2026 Fast Sistemas Construtivos</p>
        </div>
    </div>
</body>
</html>
